services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
      RUN_MODE: api
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - ./supabase:/app/supabase

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      RUN_MODE: worker
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
    command: ["pnpm", "--filter", "@placement/api", "dev:worker"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared

volumes:
  redis_data:
